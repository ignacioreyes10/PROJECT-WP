<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Properties</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            display: inline-block;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Available Properties</h1>

<div class="container">
    <div class="card" th:each="p : ${properties}">
        <h3 th:text="${p.name}"></h3>
        <p class="price" th:text="'Price: ' + ${p.price} + ' €'"></p>
        <a href="#" class="btn">View Details</a>
    </div>
</div>

</body>
</html>
